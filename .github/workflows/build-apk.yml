name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Free disk space (safe)
      run: |
        sudo rm -rf /usr/share/dotnet /usr/share/swift
        sudo apt-get clean
        df -h /

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential git zip unzip ant \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses-dev cmake libffi-dev libssl-dev \
          ninja-build ccache

    - name: Create libtinfo symlinks
      run: |
        sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5
        sudo ln -sf /usr/lib/x86_64-linux-gnu/libncurses.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5

    - name: Verify NDK toolchain
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
        echo "ANDROID_HOME=$ANDROID_HOME"
        ls -la $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/ 2>/dev/null || echo "No llvm prebuilt"
        # GitHub runner的NDK可能没有linux-x86_64，检查
        if [ -d "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" ]; then
          echo "NDK clang: $(ls $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/clang 2>/dev/null && echo EXISTS || echo MISSING)"
        else
          echo "NDK linux-x86_64 not found, checking available..."
          ls $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/ 2>/dev/null
        fi

    - name: Cache p4a builds
      uses: actions/cache@v5
      with:
        path: |
          ~/.local/share/python-for-android
        key: p4a-ndk27-v1
        restore-keys: p4a-ndk27-

    - name: Install p4a and dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36 virtualenv
        pip install python-for-android

    - name: Build APK with p4a
      env:
        ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.3.13750724
        ANDROID_HOME: /usr/local/lib/android/sdk
      run: |
        cd $GITHUB_WORKSPACE

        # 确保NDK有正确的prebuilt目录
        NDK_PREBUILT="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt"
        if [ ! -d "$NDK_PREBUILT/linux-x86_64" ]; then
          echo "Creating linux-x86_64 symlink..."
          # GitHub runner NDK might only have linux-x86_64 or be at different path
          ls "$NDK_PREBUILT/" 2>/dev/null
          # 尝试找到实际的prebuilt目录
          ACTUAL=$(ls "$NDK_PREBUILT/" 2>/dev/null | head -1)
          if [ -n "$ACTUAL" ]; then
            sudo ln -sf "$NDK_PREBUILT/$ACTUAL" "$NDK_PREBUILT/linux-x86_64"
            echo "Symlinked $ACTUAL -> linux-x86_64"
          fi
        fi

        # 验证clang存在
        CLANG="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
        if [ ! -f "$CLANG" ]; then
          echo "ERROR: clang not found at $CLANG"
          echo "NDK contents:"
          find "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt" -maxdepth 3 -type f -name "clang" 2>/dev/null || echo "No clang found"
          exit 1
        fi
        echo "clang found: $CLANG"

        p4a apk \
          --private $PWD \
          --package=org.pharmacy.pharmacy \
          --name="药房比价" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy==2.3.0,android,pyjnius,flask==2.3.3,requests==2.31.0 \
          --arch=arm64-v8a \
          --ndk-api=24 \
          --android-api=34 \
          --orientation=portrait \
          --fullscreen \
          --permission=INTERNET \
          --permission=ACCESS_NETWORK_STATE \
          --permission=WRITE_EXTERNAL_STORAGE \
          --permission=READ_EXTERNAL_STORAGE \
          --add-asset static/index.html \
          2>&1 | tee build_output.log

    - name: Extract errors
      if: always()
      run: |
        echo "=== ERRORS ==="
        grep -iE "error|fail|traceback|exception|command failed" build_output.log | grep -v "DEBUG\|INFO\|warning\|deprecated\|DeprecationWarning\|Node\|prerequisites\|stty" | tail -50
        echo ""
        echo "=== LAST 50 LINES ==="
        tail -50 build_output.log

    - name: Find APK
      if: always()
      run: |
        find . -name "*.apk" -ls 2>/dev/null || echo "No APK found"

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: build-log
        path: build_output.log
        retention-days: 7

    - name: Upload APK
      uses: actions/upload-artifact@v5
      if: success()
      with:
        name: pharmacy-apk
        path: bin/*.apk
        if-no-files-found: ignore
        retention-days: 30

    - name: Release APK
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: 药房比价系统 v1.0.${{ github.run_number }}
        body: "APK build #${{ github.run_number }}"
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
