name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Build APK with Kivy Docker image
      run: |
        mkdir -p bin
        # 直接传 android debug（镜像wrapper脚本期望平台作为第一个参数）
        docker run --name build_container \
          -v "$PWD":/home/user/project \
          -w /home/user/project \
          kivy/buildozer:latest \
          android debug \
          2>&1 | tee build_output.log

    - name: Copy APK from container
      if: always()
      run: |
        docker cp build_container:/home/user/project/bin/. ./bin/ 2>/dev/null || echo "No bin in container"
        ls -la bin/ 2>/dev/null || echo "no local bin/"
        docker rm build_container 2>/dev/null || true

    - name: Extract errors
      if: always()
      run: |
        echo "=== ERRORS ==="
        grep -iE "error|fail|traceback|exception|command failed" build_output.log | grep -v "DEBUG\|INFO\|warning\|deprecated\|DeprecationWarning\|stty" | tail -50
        echo ""
        echo "=== LAST 50 LINES ==="
        tail -50 build_output.log

    - name: Find APK
      if: always()
      run: |
        echo "=== Searching for APK ==="
        find . -name "*.apk" -ls 2>/dev/null || echo "No APK found"

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: build-log
        path: build_output.log
        retention-days: 7

    - name: Upload APK
      uses: actions/upload-artifact@v5
      if: success()
      with:
        name: pharmacy-apk
        path: bin/*.apk
        if-no-files-found: ignore
        retention-days: 30

    - name: Release APK
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: 药房比价系统 v1.0.${{ github.run_number }}
        body: "APK build #${{ github.run_number }}"
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
