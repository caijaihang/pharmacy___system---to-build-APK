name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/lib/android/sdk/ndk/27.3.13750724 /usr/local/lib/android/sdk/ndk/29.0.14206865
        sudo apt-get clean
        df -h /

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential git zip unzip \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses-dev cmake \
          libffi-dev libssl-dev \
          ninja-build ccache \
          ant

    - name: Create libtinfo symlinks
      run: |
        sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5
        sudo ln -sf /usr/lib/x86_64-linux-gnu/libncurses.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5

    - name: Cache Buildozer
      uses: actions/cache@v5
      with:
        path: |
          ~/.buildozer
          ~/.local/share/python-for-android
        key: p4a-v5-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          p4a-v5-

    - name: Install Buildozer
      run: |
        pip install --upgrade pip setuptools wheel
        pip install buildozer==1.4.0 cython==0.29.36 virtualenv

    - name: Build APK
      run: |
        cd $GITHUB_WORKSPACE
        buildozer android debug 2>&1 | tee build_output.log

    - name: Extract errors
      if: always()
      run: |
        echo "========== ERROR SUMMARY =========="
        grep -i -n "error\|failed\|command failed\|exception\|traceback" build_output.log | grep -v "DEBUG\|INFO\|warning\|deprecated\|DEP0040\|no matching\|Skipped\|_test_" | tail -80 || echo "No critical errors found"
        echo ""
        echo "========== LAST 100 LINES =========="
        tail -100 build_output.log

    - name: List output
      if: always()
      run: |
        echo "=== bin/ ==="
        ls -la bin/ 2>/dev/null || echo "bin/ not found"
        find . -name "*.apk" 2>/dev/null || echo "No APK"

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: build-log
        path: build_output.log
        retention-days: 7

    - name: Upload APK
      uses: actions/upload-artifact@v5
      if: success()
      with:
        name: pharmacy-apk
        path: bin/*.apk
        retention-days: 30

    - name: Release APK
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: 药房比价系统 v1.0.${{ github.run_number }}
        body: "APK build #${{ github.run_number }}"
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
