name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git zip unzip \
          openjdk-17-jdk-headless \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses-dev cmake \
          libffi-dev libssl-dev \
          ninja-build ccache

    - name: Create libtinfo5 symlink
      run: |
        sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5
        sudo ln -sf /usr/lib/x86_64-linux-gnu/libncurses.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5

    - name: Cache Buildozer
      uses: actions/cache@v5
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: buildozer-v2-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-v2-

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer==1.6.0 cython==0.29.36 virtualenv

    - name: Build APK
      run: |
        cd $GITHUB_WORKSPACE
        set -o pipefail
        buildozer android debug 2>&1 | tee build_output.log | tail -500
        echo "=== Build completed ==="

    - name: Show full error on failure
      if: failure()
      run: |
        echo "=== FULL BUILD LOG (last 1000 lines) ==="
        tail -1000 build_output.log 2>/dev/null || echo "No build log"
        echo "=== .buildozer error logs ==="
        find .buildozer -name "*.log" -exec echo "--- {} ---" \; -exec tail -50 {} \; 2>/dev/null || echo "No error logs"

    - name: List build output
      if: always()
      run: |
        echo "=== bin/ contents ==="
        ls -la bin/ 2>/dev/null || echo "bin/ does not exist"
        find . -name "*.apk" 2>/dev/null || echo "No APK found"

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: build-log
        path: build_output.log
        retention-days: 7

    - name: Upload APK artifact
      uses: actions/upload-artifact@v5
      if: success()
      with:
        name: pharmacy-android-apk
        path: bin/*.apk
        retention-days: 30

    - name: Get APK info
      if: success()
      id: apk_info
      run: |
        APK_PATH=$(find bin -name "*.apk" | head -1)
        if [ -n "$APK_PATH" ]; then
          APK_NAME=$(basename "$APK_PATH")
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "APK found: $APK_NAME ($APK_SIZE)"
        else
          echo "No APK found"
          exit 1
        fi

    - name: Create GitHub Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: 药房进货比较系统 APK v1.0.${{ github.run_number }}
        body: |
          ## 药房进货比较系统 Android APK

          ### 安装说明
          1. 下载下方 `.apk` 文件到手机
          2. 在手机设置中允许"安装未知来源应用"
          3. 点击安装即可使用

          ### 功能
          - 四大供应商药品比价搜索
          - 购物车管理
          - Excel批量查询导出
          - 原价/折后价显示
          - 购物车现存数量实时查询

          ### 构建信息
          - 构建编号: ${{ github.run_number }}
        files: |
          ${{ steps.apk_info.outputs.apk_path }}
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
