name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Pull radiant_p4a Docker image
      run: docker pull dunderlab/radiant_p4a:latest

    - name: Build APK
      run: |
        docker create -i --name pharmacy_build \
          --mount type=bind,source="$(pwd)",target=/app/env \
          dunderlab/radiant_p4a:latest

        docker start pharmacy_build

        # 在容器内执行p4a构建APK
        docker exec pharmacy_build p4a apk \
          --private /app/env \
          --package=org.pharmacy.pharmacy \
          --name="药房比价" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy==2.3.0,android,pyjnius,flask==2.3.3,requests==2.31.0 \
          --arch=arm64-v8a \
          --ndk-api=24 \
          --android-api=35 \
          --orientation=portrait \
          --fullscreen \
          --permission=INTERNET \
          --permission=ACCESS_NETWORK_STATE \
          --permission=WRITE_EXTERNAL_STORAGE \
          --permission=READ_EXTERNAL_STORAGE \
          2>&1 | tee build_output.log

        docker stop pharmacy_build

    - name: Copy APK from container
      if: always()
      run: |
        docker cp pharmacy_build:/app/env/bin/. ./bin/ 2>/dev/null || echo "No bin/"
        docker cp pharmacy_build:. 2>/dev/null | head -5 || true
        ls -la bin/ 2>/dev/null || echo "no local bin/"
        find . -name "*.apk" -ls 2>/dev/null || echo "No APK found"
        docker rm pharmacy_build 2>/dev/null || true

    - name: Extract errors
      if: always()
      run: |
        echo "=== ERRORS ==="
        grep -iE "error|fail|traceback|exception|command failed" build_output.log | grep -v "DEBUG\|INFO\|warning\|deprecated\|DeprecationWarning\|stty" | tail -50
        echo ""
        echo "=== LAST 50 LINES ==="
        tail -50 build_output.log

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: build-log
        path: build_output.log
        retention-days: 7

    - name: Upload APK
      uses: actions/upload-artifact@v5
      if: success()
      with:
        name: pharmacy-apk
        path: bin/*.apk
        if-no-files-found: ignore
        retention-days: 30

    - name: Release APK
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: 药房比价系统 v1.0.${{ github.run_number }}
        body: "APK build #${{ github.run_number }}"
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
